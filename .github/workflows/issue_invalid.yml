name: Issue Invalid

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  lock-issue:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'invalid'
    steps:
      - name: Lock issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          gh api -X PUT "repos/${GH_REPO}/issues/${ISSUE_NUMBER}/lock" -f lock_reason=off-topic --silent
