name: Issue Wontfix

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  lock-issue:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'wontfix'
    steps:
      - name: Create comment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          set -euo pipefail

          body="$(cat <<EOF
          Hello @${ISSUE_AUTHOR}, this issue will not be worked on and will be closed.
          你好 @${ISSUE_AUTHOR}，这不会被处理，将被关闭。
          EOF
          )"
          gh issue comment "${ISSUE_NUMBER}" --body "${body}"
      - name: Close issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          gh issue close "${ISSUE_NUMBER}" --reason "not planned"
